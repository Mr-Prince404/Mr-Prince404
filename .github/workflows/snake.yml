name: Generate contribution snake

on:
  schedule:
    # Runs daily at 06:00 UTC.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate light and dark SVG animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#E11D48&color_dots=#EBEDF0,#BFDBFE,#60A5FA,#D946EF,#E11D48
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#F43F5E&color_dots=#161B22,#1E3A8A,#2563EB,#C026D3,#F43F5E
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish animations to the output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b output
          git add .
          git commit -m "chore: update contribution snake"

          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git push --force origin output
