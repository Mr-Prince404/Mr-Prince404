name: Update profile statistics

on:
  schedule:
    - cron: "15 6 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-statistics
  cancel-in-progress: true

jobs:
  generate:
    name: Generate profile cards
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Generate dark statistics card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&rank_icon=github&hide_border=true&bg_color=0D1117&title_color=38BDF8&text_color=E6EDF3&icon_color=F43F5E"
          path: profile/stats-dark.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate light statistics card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&rank_icon=github&hide_border=true&bg_color=FFFFFF&title_color=2563EB&text_color=111827&icon_color=E11D48"
          path: profile/stats-light.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate dark languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&size_weight=0.5&count_weight=0.5&hide_border=true&bg_color=0D1117&title_color=D946EF&text_color=E6EDF3"
          path: profile/top-langs-dark.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate light languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&size_weight=0.5&count_weight=0.5&hide_border=true&bg_color=FFFFFF&title_color=C026D3&text_color=111827"
          path: profile/top-langs-light.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add profile/*.svg

          if git diff --cached --quiet; then
            echo "Profile cards are already up to date."
            exit 0
          fi

          git commit -m "chore: update profile statistics"
          git push
